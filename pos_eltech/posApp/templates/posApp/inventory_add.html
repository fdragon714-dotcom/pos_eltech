{% extends "posApp/base.html" %}
{% load humanize %}
{% block pageContent %}
<div class="mdc-layout-grid__cell stretch-card mdc-layout-grid__cell--span-12">
    <div class="mdc-card">
        <h4 class="card-title">Catat Stok Masuk</h4>
        <form id="add-stock-form" class="mt-3">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="control-label">Pilih Produk</label>
                    <select name="product_id" id="product_id" class="form-select form-select-sm" required>
                        <option value="" disabled {% if not request.GET.product_id %}selected{% endif %}>Pilih produk...</option>
                        {% for p in products %}
                        <option value="{{ p.id }}" {% if request.GET.product_id == p.id|stringformat:"s" %}selected{% endif %}>{{ p.code }} - {{ p.name }} (Stok Saat Ini: {{ p.stock }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="control-label">Jenis Masuk</label>
                    <select name="movement_type" class="form-select form-select-sm" required>
                        <option value="Pembelian Baru">Pembelian Baru</option>
                        <option value="Retur dari Pelanggan">Retur dari Pelanggan</option>
                        <option value="Stok Awal">Stok Awal</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="control-label">Jumlah Unit Masuk</label>
                    <input type="number" name="qty" class="form-control form-control-sm" min="1" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="control-label">Harga Beli per Unit (Opsional)</label>
                    <input type="number" name="buy_price" class="form-control form-control-sm" min="0">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="control-label">Keterangan / Catatan</label>
                    <textarea name="note" class="form-control" rows="3" required></textarea>
                </div>
            </div>
            <div class="d-flex justify-content-end mt-3">
                <button class="btn btn-primary btn-sm rounded-pill px-4 shadow-sm border-0" type="submit">Simpan Stok Masuk</button>
            </div>
        </form>
    </div>
</div>
{% endblock pageContent %}
{% block ScriptBlock %}
<script>
    $(function() {
        $('#add-stock-form').submit(function(e) {
            e.preventDefault();
            var _this = $(this);
            $.ajax({
                headers: {
                    "X-CSRFToken": '{{csrf_token}}'
                },
                url: "{% url 'inventory-add' %}",
                data: new FormData($(this)[0]),
                cache: false,
                contentType: false,
                processData: false,
                method: 'POST',
                type: 'POST',
                dataType: 'json',
                success: function(resp) {
                    if (typeof resp == 'object' && resp.status == 'success') {
                        location.replace("{% url 'inventory-page' %}");
                    } else if (resp.status == 'failed' && !!resp.msg) {
                        alert(resp.msg);
                    } else {
                        alert("Terjadi kesalahan.");
                    }
                }
            });
        });
    });
</script>
{% endblock ScriptBlock %}
