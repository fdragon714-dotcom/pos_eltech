{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-Tech POS | Login</title>

    <link rel="stylesheet" href="{% static 'posApp/assets/bootstrap/css/bootstrap.min.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
    <script src="{% static 'posApp/assets/default/js/jquery-3.6.0.min.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://unpkg.com/@rive-app/canvas@2.10.3"></script>

    <style>
        /* --- PREMIUM SWEETALERT --- */
        .swal-premium-popup {
            background: rgba(15, 23, 42, 0.75) !important;
            backdrop-filter: blur(24px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 24px !important;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            padding: 2rem 1.5rem !important;
        }
        .swal-premium-title {
            font-family: 'Outfit', sans-serif !important;
            font-size: 1.5rem !important;
            font-weight: 700 !important;
            letter-spacing: -0.5px !important;
            color: #ffffff !important;
        }
        .swal-premium-html {
            color: #94a3b8 !important;
            font-size: 0.95rem !important;
            font-weight: 500 !important;
            line-height: 1.6 !important;
            margin-top: 0.5rem !important;
        }
        .swal-premium-confirm {
            background: linear-gradient(135deg, #2563eb, #4f46e5) !important;
            border: none !important;
            border-radius: 12px !important;
            font-weight: 700 !important;
            letter-spacing: 0.5px !important;
            padding: 12px 28px !important;
            color: #ffffff !important;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3) !important;
            transition: all 0.3s ease !important;
        }
        .swal-premium-confirm:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4) !important;
        }
        .swal2-icon.swal2-error {
            border-color: rgba(239, 68, 68, 0.5) !important;
            color: #ef4444 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.15) !important;
        }
        .swal2-icon.swal2-error [class^=swal2-x-mark-line] {
            background-color: #ef4444 !important;
        }
        .swal2-icon.swal2-warning {
            border-color: rgba(245, 158, 11, 0.5) !important;
            color: #f59e0b !important;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.15) !important;
        }
        .swal2-icon.swal2-warning .swal2-icon-content {
            color: #f59e0b !important;
        }
        /* --- COLOR PALETTE & FONTS --- */
        :root {
            --glass-bg: rgba(17, 24, 39, 0.75);
            --neon-green: #00e676; 
            --neon-green-glow: rgba(0, 230, 118, 0.35);
            --neon-blue: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: var(--font-body);
            color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        /* =========================================================
           1. ANIMASI BACKGROUND: GRADASI BERGERAK (MOVING GRADIENT)
           ========================================================= */
        .animated-gradient-bg {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 0;
            /* Perpaduan warna gelap premium dengan sedikit sentuhan hijau El-Tech dan biru tua */
            background: linear-gradient(-45deg, #030712, #0a192f, #003d1f, #0f172a, #020617);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* =========================================================
           2. WADAH UTAMA & ANIMASI TEPI KARTU
           ========================================================= */
        .auth-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 460px; 
            display: flex; flex-direction: column; align-items: center;
            border-radius: 32px;
            padding: 45px 35px 35px 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            
            /* Trik Animasi Border Gradasi */
            border: 2px solid transparent;
            background: 
                linear-gradient(var(--glass-bg), var(--glass-bg)) padding-box,
                linear-gradient(60deg, var(--neon-green), transparent 30%, var(--neon-blue), transparent 70%) border-box;
            background-size: 300% 300%;
            
            /* Gabungan Animasi: Masuk + Border Mengalir */
            opacity: 0; transform: translateY(40px);
            animation: 
                cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
                borderFlow 6s ease infinite alternate;
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- HEADER & LOGO --- */
        .brand-header {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            margin-bottom: 5px;
        }
        .logo-box {
            width: 75px; height: 75px; border-radius: 50%; overflow: hidden;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green-glow);
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-box img { width: 105%; height: 105%; object-fit: cover; }
        
        .brand-text { text-align: center; }
        .brand-text h1 {
            font-family: var(--font-head); font-weight: 800; font-size: 2rem; 
            margin: 0 0 2px 0; color: #fff; letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(0, 230, 118, 0.3);
        }
        .brand-text p {
            font-size: 0.85rem; color: var(--text-secondary); margin: 0; 
            text-transform: uppercase; letter-spacing: 3px; font-weight: 600;
        }

        /* --- BERUANG RAKSASA --- */
        .rive-container {
            width: 330px; 
            height: 330px; 
            margin-bottom: -81px; 
            position: relative;
            z-index: 5; 
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
        }
        canvas#rive-canvas { width: 100%; height: 100%; display: block; }

        /* --- INNER FORM BOX --- */
        .auth-form-wrapper {
            width: 100%;
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 35px 25px 25px 25px; 
            position: relative;
            z-index: 10; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* --- INPUT FIELDS --- */
        .input-group-custom { margin-bottom: 20px; position: relative; }
        .input-group-custom i {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: #64748b; font-size: 22px; transition: 0.3s ease; z-index: 2;
        }
        .input-group-custom input {
            width: 100%; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
            padding: 16px 20px 16px 55px; color: #fff; font-size: 1.05rem;
            font-weight: 500; transition: all 0.3s ease; outline: none;
            position: relative; z-index: 1;
        }
        .input-group-custom input::placeholder { color: #475569; font-weight: 400;}
        
        .input-group-custom input:focus {
            background: rgba(0, 230, 118, 0.04);
            border-color: var(--neon-green);
            box-shadow: 0 0 0 4px var(--neon-green-glow);
            transform: translateY(-2px);
        }
        .input-group-custom input:focus + i, 
        .input-group-custom input:not(:placeholder-shown) + i { color: var(--neon-green); }

        /* --- NOTIFIKASI BATAS KARAKTER --- */
        .char-limit-notif {
            color: #ef4444; /* Merah Peringatan */
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: -12px;
            margin-bottom: 15px;
            margin-left: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .char-limit-notif.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(2px);
        }
        .char-limit-notif i { font-size: 14px; }

        /* --- ACTION BUTTON --- */
        .btn-submit {
            width: 100%; padding: 16px; margin-top: 5px;
            background: var(--neon-green); color: #000;
            border: none; border-radius: 16px; 
            font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px var(--neon-green-glow);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 230, 118, 0.4); background: #00ff88; }
        .btn-submit:active { transform: translateY(0); box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3); }
        .btn-submit:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }

        .spinner-icon { display: none; font-size: 22px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer-text { margin-top: 30px; text-align: center; font-size: 0.8rem; color: #475569; }

        /* --- ADMIN LOGIN LINK --- */
        .admin-login-link {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-family: var(--font-head);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            background: rgba(17, 24, 39, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .admin-login-link:hover {
            color: var(--neon-green);
            background: rgba(17, 24, 39, 0.8);
            border-color: rgba(0, 230, 118, 0.4);
            box-shadow: 0 5px 15px rgba(0, 230, 118, 0.2);
            transform: translateY(-2px);
        }
        .admin-login-link i {
            font-size: 1.2rem;
        }

    </style>
</head>

<body>

    <div class="animated-gradient-bg"></div>

    <a href="/admin/" class="admin-login-link">
        <i class="material-icons-round">admin_panel_settings</i>
        <span>Login Admin</span>
    </a>

    <div class="auth-container">
        
        <div class="brand-header">
            <div class="logo-box">
                <img src="{% static 'posApp/assets/images/logo-hijau.jpeg' %}" alt="El-Tech Logo">
            </div>
            <div class="brand-text">
                <h1>EL-TECH</h1>
                <p>Point of Sale</p>
            </div>
        </div>

        <div class="rive-container">
            <canvas id="rive-canvas"></canvas>
        </div>

        <div class="auth-form-wrapper">
            <form id="login-form">
                {% csrf_token %}
                
                <div class="input-group-custom">
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="off" maxlength="20">
                    <i class="material-icons-round">person_outline</i>
                </div>

                <div class="input-group-custom" style="margin-bottom: 12px;">
                    <input type="password" id="password" name="password" placeholder="Password" required maxlength="15">
                    <i class="material-icons-round">lock_outline</i>
                </div>

                <div id="password-notif" class="char-limit-notif">
                    <i class="material-icons-round">error_outline</i> Maksimal 15 karakter!
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">
                    <span class="btn-text">MASUK</span>
                    <i class="material-icons-round spinner-icon">autorenew</i>
                </button>
            </form>
        </div>

        <div class="footer-text">
            &copy; {% now "Y" %} El-Tech Computer. All rights reserved.
        </div>

    </div>

    <script>
        $(function() {

            // =========================================================================
            // LOGIKA NOTIFIKASI BATAS PASSWORD 15 KARAKTER
            // =========================================================================
            $('#password').on('input', function() {
                if ($(this).val().length >= 15) {
                    $('#password-notif').addClass('show');
                } else {
                    $('#password-notif').removeClass('show');
                }
            });


            // =========================================================================
            // LOGIKA ANIMASI RIVE (BERUANG TETAP SAMA 100%)
            // =========================================================================
            let triggerSuccessRive, triggerFailRive;

            const riveInstance = new rive.Rive({
                src: '{% static "posApp/assets/anim/beruang.riv" %}', 
                canvas: document.getElementById('rive-canvas'),
                autoplay: true,
                stateMachines: 'Login Machine', 
                
                onLoad: () => {
                    riveInstance.resizeDrawingSurfaceToCanvas();
                    const smNames = riveInstance.stateMachineNames;
                    if(smNames.length === 0) return;
                    const activeSM = smNames[0]; 
                    riveInstance.play(activeSM);
                    
                    const inputs = riveInstance.stateMachineInputs(activeSM);
                    if (!inputs) return;

                    const findInput = (names) => inputs.find(i => names.includes(i.name));

                    const isChecking = findInput(['isChecking', 'Check', 'check']);
                    const lookMultiplier = findInput(['numLook', 'Look', 'look']);
                    const isHandsUp = findInput(['isHandsUp', 'hands_up', 'HandsUp']);
                    
                    triggerSuccessRive = findInput(['trigSuccess', 'success', 'Success']);
                    triggerFailRive = findInput(['trigFail', 'fail', 'Fail']);

                    const userField = document.getElementById('username');
                    const passField = document.getElementById('password');

                    if(userField) {
                        userField.addEventListener('focus', () => {
                            if (isHandsUp) isHandsUp.value = false;
                            if (isChecking) isChecking.value = true;
                        });
                        userField.addEventListener('blur', () => {
                            if (isChecking) isChecking.value = false;
                        });
                        userField.addEventListener('input', (e) => {
                            if (lookMultiplier && isChecking && isChecking.value) {
                                // Penyesuaian agar mata beruang menengok pas untuk 12 huruf
                                const length = e.target.value.length;
                                const lookValue = Math.min((length / 12) * 100, 100); 
                                lookMultiplier.value = lookValue;
                            }
                        });
                    }

                    if(passField) {
                        passField.addEventListener('focus', () => {
                            if (isChecking) isChecking.value = false;
                            if (isHandsUp) isHandsUp.value = true;
                        });
                        passField.addEventListener('blur', () => {
                            if (isHandsUp) isHandsUp.value = false;
                        });
                    }
                }
            });

            // =========================================================================
            // LOGIKA FORM SUBMIT AJAX (TETAP SAMA 100%)
            // =========================================================================
            $('#login-form').submit(function(e) {
                e.preventDefault();
                const $btn = $('#btn-submit');
                const $text = $btn.find('.btn-text');
                const $spinner = $btn.find('.spinner-icon');
                
                $btn.prop('disabled', true);
                $text.text('MEMPROSES...');
                $spinner.show();

                $.ajax({
                    headers: { "X-CSRFToken": '{{csrf_token}}' },
                    url: "{% url 'login-user' %}",
                    data: new FormData(this),
                    cache: false,
                    contentType: false,
                    processData: false,
                    method: 'POST',
                    dataType: 'json',
                    success: function(resp) {
                        if (resp.status == 'success') {
                            if (triggerSuccessRive) triggerSuccessRive.fire();
                            $spinner.text('check_circle').css('animation', 'none');
                            $text.text('BERHASIL');
                            setTimeout(() => { location.href = "{% url 'home-page' %}" }, 1000); 
                        } else {
                            if (triggerFailRive) triggerFailRive.fire();
                            Swal.fire({
                                icon: 'error',
                                title: 'Akses Ditolak',
                                text: resp.msg || 'Username atau Password yang Anda masukkan salah.',
                                confirmButtonText: 'Coba Lagi',
                                buttonsStyling: false,
                                customClass: {
                                    popup: 'swal-premium-popup',
                                    title: 'swal-premium-title',
                                    htmlContainer: 'swal-premium-html',
                                    confirmButton: 'swal-premium-confirm'
                                , confirmButton: 'swal-premium-confirm', cancelButton: 'swal-premium-cancel' }
                            });
                            $btn.prop('disabled', false);
                            $text.text('MASUK');
                            $spinner.hide();
                        }
                    },
                    error: function() {
                        if (triggerFailRive) triggerFailRive.fire();
                        Swal.fire({
                            icon: 'warning',
                            title: 'Koneksi Terputus',
                            text: 'Gagal terhubung ke server. Silakan periksa koneksi internet Anda dan coba lagi.',
                            confirmButtonText: 'Mengerti',
                            buttonsStyling: false,
                            customClass: {
                                popup: 'swal-premium-popup',
                                title: 'swal-premium-title',
                                htmlContainer: 'swal-premium-html',
                                confirmButton: 'swal-premium-confirm'
                            , confirmButton: 'swal-premium-confirm', cancelButton: 'swal-premium-cancel' }
                        });
                        $btn.prop('disabled', false);
                        $text.text('MASUK');
                        $spinner.hide();
                    }
                });
            });
        });
    </script>
</body>
</html>
